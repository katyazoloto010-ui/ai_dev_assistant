<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dev Assistant</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}

.buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

button.secondary {
    background: #334155;
}

.task {
    background: #111827;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>👨‍💻 AI Dev Assistant</h1>

<div class="card">
    <p>Выбери язык:</p>
    <div class="buttons">
        <button onclick="send('Python')">🐍 Python</button>
        <button onclick="send('JS')">🌐 JS</button>
        <button onclick="send('PHP')">🐘 PHP</button>
    </div>
</div>

<div class="card">
    <p>Уровень:</p>
    <div class="buttons">
        <button class="secondary" onclick="send('Новичок')">🟢</button>
        <button class="secondary" onclick="send('Средний')">🟡</button>
        <button class="secondary" onclick="send('Продвинутый')">🔴</button>
    </div>
</div>

<div class="card">
    <p>Задание:</p>
    <button onclick="send('task')">📚 Получить задание</button>
</div>

<div class="card">
    <p>Проверка кода:</p>
    <textarea id="code" placeholder="Вставь код..." style="width:100%;height:100px;border-radius:10px;padding:10px;"></textarea>
    <br><br>
    <button onclick="sendCode()">🛠 Проверить</button>
</div>

</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

function send(data) {
    tg.sendData(data);
}

function sendCode() {
    let code = document.getElementById("code").value;
    tg.sendData("code:" + code);
}
</script>

</body>
</html>
