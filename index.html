<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dev Assistant</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    font-size: 14px;
}

textarea {
    width: 100%;
    height: 100px;
    border-radius: 10px;
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>👨‍💻 AI Dev Assistant</h2>

<div class="card">
    <p>Язык:</p>
    <button onclick="send('Python')">🐍 Python</button>
    <button onclick="send('JS')">🌐 JS</button>
    <button onclick="send('PHP')">🐘 PHP</button>
</div>

<div class="card">
    <p>Уровень:</p>
    <button onclick="send('Новичок')">🟢 Новичок</button>
    <button onclick="send('Средний')">🟡 Средний</button>
    <button onclick="send('Продвинутый')">🔴 Продвинутый</button>
</div>

<div class="card">
    <button onclick="send('task')">📚 Получить задание</button>
</div>

<div class="card">
    <textarea id="code" placeholder="Вставь код..."></textarea>
    <button onclick="sendCode()">🛠 Проверить код</button>
</div>

</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

function send(data) {
    tg.sendData(data);
}

function sendCode() {
    let code = document.getElementById("code").value;
    tg.sendData("code:" + code);
}
</script>

</body>
</html>
